<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highlight Reel — Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  svg { max-width: 1100px; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700" letter-spacing="1">Highlight Reel</text>
  <text x="550" y="66" text-anchor="middle" fill="#64748b" font-size="14">Spoiler-free MLB game recaps, delivered to your inbox</text>

  <!-- ===== FLOW LABELS ===== -->
  <text x="280" y="105" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600" letter-spacing="1.5">USER FLOW</text>
  <text x="820" y="105" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600" letter-spacing="1.5">CRON FLOW (HOURLY)</text>

  <!-- Divider -->
  <line x1="550" y1="95" x2="550" y2="590" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ========== USER FLOW (Left Side) ========== -->

  <!-- User -->
  <circle cx="280" cy="175" r="30" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="163" text-anchor="middle" fill="#e2e8f0" font-size="22">&#x1F464;</text>
  <text x="280" y="185" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">USER</text>

  <!-- Arrow: User -> Next.js -->
  <line x1="280" y1="208" x2="280" y2="258" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="295" y="238" fill="#60a5fa" font-size="10">login / pick teams</text>

  <!-- Next.js App -->
  <rect x="155" y="262" width="250" height="70" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="292" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Next.js App</text>
  <text x="280" y="312" text-anchor="middle" fill="#64748b" font-size="11">Pages + API Routes</text>

  <!-- Arrow: Next.js -> Supabase -->
  <line x1="280" y1="335" x2="280" y2="398" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="295" y="372" fill="#60a5fa" font-size="10">auth + read/write</text>

  <!-- Supabase -->
  <rect x="155" y="402" width="250" height="70" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="280" y="432" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Supabase</text>
  <text x="280" y="452" text-anchor="middle" fill="#64748b" font-size="11">Auth (magic link) + Postgres DB</text>

  <!-- Cloudflare badge on Next.js box -->
  <rect x="310" y="320" width="110" height="22" rx="6" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="365" y="335" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">Cloudflare Workers</text>

  <!-- ========== CRON FLOW (Right Side) ========== -->

  <!-- Cloudflare Cron Trigger -->
  <rect x="720" y="135" width="200" height="55" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="820" y="160" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Cloudflare Cron</text>
  <text x="820" y="177" text-anchor="middle" fill="#64748b" font-size="11">Scheduled trigger (hourly)</text>

  <!-- Arrow: Cron -> /api/cron -->
  <line x1="820" y1="193" x2="820" y2="258" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="835" y="230" fill="#fbbf24" font-size="10">POST /api/cron</text>

  <!-- /api/cron handler -->
  <rect x="695" y="262" width="250" height="70" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="820" y="292" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Cron Worker</text>
  <text x="820" y="312" text-anchor="middle" fill="#64748b" font-size="11">Check games + send highlights</text>

  <!-- Three outputs from cron worker -->

  <!-- Arrow: Cron Worker -> MLB API (right) -->
  <line x1="948" y1="297" x2="1020" y2="297" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- MLB API box -->
  <rect x="1000" y="262" width="90" height="70" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="1045" y="293" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">MLB</text>
  <text x="1045" y="308" text-anchor="middle" fill="#ef4444" font-size="9">Stats API</text>
  <text x="1045" y="322" text-anchor="middle" fill="#64748b" font-size="8">highlights</text>

  <!-- Arrow: Cron Worker -> Supabase (down-left) -->
  <path d="M 760 335 Q 650 370 530 437" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="630" y="375" fill="#fbbf24" font-size="10">get subscribers</text>

  <!-- Arrow: Cron Worker -> Brevo (down) -->
  <line x1="820" y1="335" x2="820" y2="398" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="835" y="372" fill="#fbbf24" font-size="10">send emails</text>

  <!-- Brevo -->
  <rect x="695" y="402" width="250" height="70" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="820" y="432" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Brevo</text>
  <text x="820" y="452" text-anchor="middle" fill="#64748b" font-size="11">Transactional email API</text>

  <!-- Arrow: Brevo -> User Inbox -->
  <line x1="820" y1="475" x2="820" y2="530" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- User Inbox -->
  <rect x="720" y="534" width="200" height="50" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="820" y="557" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">&#x1F4E7;  User Inbox</text>
  <text x="820" y="574" text-anchor="middle" fill="#64748b" font-size="10">spoiler-free highlight links</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="545" width="180" height="65" rx="8" fill="#0f1117" stroke="#1e293b" stroke-width="1"/>
  <circle cx="50" cy="563" r="5" fill="#3b82f6"/><text x="62" y="567" fill="#94a3b8" font-size="10">Next.js / User flow</text>
  <circle cx="50" cy="583" r="5" fill="#fbbf24"/><text x="62" y="587" fill="#94a3b8" font-size="10">Cron / Background flow</text>
  <circle cx="50" cy="603" r="5" fill="#22c55e"/><text x="62" y="607" fill="#94a3b8" font-size="10">Database</text>
</svg>
</body>
</html>
