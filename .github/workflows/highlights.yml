name: Mariners Highlights Emailer

on:
  schedule:
    # Every 30 min from 02:00-08:30 UTC (covers ~6 PM - 1 AM Pacific)
    - cron: '0,30 2-8 * * *'
    # 09:00 UTC catch-all for late West Coast games
    - cron: '0 9 * * *'
  workflow_dispatch: {}

concurrency:
  group: highlights-emailer
  cancel-in-progress: false

jobs:
  check-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run highlights emailer
        env:
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node src/index.js

      - name: Commit sent-games.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent-games.json
          if ! git diff --staged --quiet; then
            git commit -m "Update sent-games.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
