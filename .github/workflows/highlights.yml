name: Mariners Highlights Emailer

on:
  schedule:
    # Hourly from 23:00-08:00 UTC (3 PM - 12 AM Pacific), covers all US time zones
    - cron: '0 23 * * *'
    - cron: '0 0-8 * * *'
    # 10:00 UTC (2 AM Pacific) catch-all for extra-inning games
    - cron: '0 10 * * *'
  workflow_dispatch: {}

concurrency:
  group: highlights-emailer
  cancel-in-progress: false

jobs:
  check-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run highlights emailer
        env:
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node src/index.js

      - name: Commit sent-games.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent-games.json
          if ! git diff --staged --quiet; then
            git commit -m "Update sent-games.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
